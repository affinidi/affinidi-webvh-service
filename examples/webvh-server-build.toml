# ============================================================================
# WebVH Server Build Recipe
# ============================================================================
#
# Drives `webvh-server setup --from <this-file>` non-interactively. The
# webvh-server hosts DID documents over HTTP and receives sync updates
# from the control plane over DIDComm.
#
# SECURITY: This file contains NO secrets.
# ============================================================================

[deployment]
service = "server"
vta_mode = "online"

[output]
config_path = "config.toml"

[server]
host = "0.0.0.0"
port = 8530
log_level = "info"
log_format = "text"
data_dir = "data/webvh-server"

[identity]
# Public URL that becomes the server's did:webvh identifier.
public_url = "https://server1.example.com"
# DIDComm mediator for runtime sync (NOT embedded in the DID document).
# mediator_did = "did:webvh:mediator.example.com"

# Control plane's DID for authenticating sync messages. The server
# refuses sync from any other DID once this is set.
# control_did = "did:webvh:..."
# Optional HTTP URL of the control plane (used by tooling, not the runtime).
# control_url = "https://control.example.com"

[vta]
did = "did:webvh:vta.example.com"
context_id = "webvh"

[secrets]
backend = "keyring"
keyring_service = "webvh"

[admin]
mode = "skip"

[reprovision]
force = false
