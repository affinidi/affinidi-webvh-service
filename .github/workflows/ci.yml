name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  # Pinned MSRV — must equal `rust-version` in the workspace Cargo.toml.
  # Bumping one without the other causes silent drift.
  MSRV: "1.95.0"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo clippy --workspace --all-targets -- -D warnings

  msrv:
    # NB: the `env` context is NOT available in `jobs.<job_id>.name` (only
    # github/needs/strategy/matrix/inputs/vars are). Referencing `${{ env.MSRV }}`
    # here makes GitHub reject the whole workflow at startup — no jobs run. Keep
    # this name static; the MSRV value is asserted against Cargo.toml below.
    name: MSRV build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify Cargo.toml `rust-version` matches MSRV env var
        run: |
          declared=$(grep '^rust-version' Cargo.toml | head -n1 | sed -E 's/rust-version *= *"([^"]+)"/\1/')
          if [ "$declared" != "${{ env.MSRV }}" ]; then
            echo "::error::workspace rust-version ($declared) does not match CI MSRV (${{ env.MSRV }})"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: MSRV — build workspace (default features)
        run: cargo +${{ env.MSRV }} build --workspace --locked
      - name: MSRV — build did-hosting-common with every feature combination
        # Cloud-secret backends and non-default storage backends are gated
        # behind feature flags. They must also build at MSRV; otherwise a
        # 1.95-only API in (e.g.) aws-sdk-secretsmanager would slip through
        # the default-features build and break operator-driven feature
        # selections at the next minor release.
        #
        # `method-webvh` and `method-web` (multi-method rollout, T11/T24)
        # are also feature-gated; same MSRV-pass rationale.
        run: |
          for feat in keyring aws-secrets gcp-secrets azure-secrets \
                     store-fjall store-redis store-dynamodb \
                     store-firestore store-cosmosdb passkey \
                     setup-wizard metrics \
                     method-webvh method-web; do
            echo "::group::MSRV build did-hosting-common --features server-core,$feat"
            cargo +${{ env.MSRV }} build -p did-hosting-common --locked \
              --no-default-features --features "server-core,$feat"
            echo "::endgroup::"
          done

  test:
    name: cargo test (${{ matrix.store }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Storage backends are mutually exclusive at the build-script level, so
        # each one needs its own job. `method-webvh,method-web` are included so
        # the method-dependent unit tests (domain::safety host extraction) run.
        #
        # Only the embedded fjall backend runs the unit suite (`run_tests:
        # true`). The generic handler/ACL tests assume an isolated, empty store
        # per test (fjall gives each a fresh temp dir); a single shared redis or
        # a cloud emulator cross-contaminates parallel tests, so those backends
        # are build-only here. Real backend integration tests would need
        # per-test isolation (FLUSHDB / unique key prefixes) — out of scope.
        include:
          - store: store-fjall
            features: "server-core,store-fjall,keyring,passkey,setup-wizard,method-webvh,method-web"
            run_tests: true
          - store: store-redis
            features: "server-core,store-redis,method-webvh,method-web"
            run_tests: false
          - store: store-dynamodb
            features: "server-core,store-dynamodb,method-webvh,method-web"
            run_tests: false
          - store: store-firestore
            features: "server-core,store-firestore,method-webvh,method-web"
            run_tests: false
          - store: store-cosmosdb
            features: "server-core,store-cosmosdb,method-webvh,method-web"
            run_tests: false
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build did-hosting-common with ${{ matrix.store }}
        run: >
          cargo build -p did-hosting-common --no-default-features
          --features "${{ matrix.features }}"
      - name: Test did-hosting-common with ${{ matrix.store }}
        # Only embedded fjall runs the unit suite (isolated per-test store);
        # other backends are build-only above.
        if: matrix.run_tests
        run: >
          cargo test -p did-hosting-common --lib --no-default-features
          --features "${{ matrix.features }}"

  test-default:
    name: cargo test (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      # `--locked` ensures Cargo.lock matches the workspace manifest exactly,
      # so a transitive dep bump cannot quietly land via the test job before
      # being explicitly bumped in Cargo.toml.
      - run: cargo test --workspace --locked
      # The setup-recipe example files (`examples/webvh-*-build.toml`) are
      # the operator-facing contract for non-interactive setup. The smoke
      # test loads each one, validates it, and fails the build on schema
      # drift. Gated on `server-core` because the recipe module lives
      # under `did_hosting_common::server`.
      - name: setup-recipe examples parse + validate
        run: >
          cargo test -p did-hosting-common --locked
          --features server-core --test recipe_examples
      # End-to-end smoke test for the offline-prepare (phase 1) recipe
      # path. Exercises `run_vta_for_recipe` + plaintext-store seed
      # round-trip; the only piece between this passing and a fully
      # air-gapped non-interactive install is the operator-ferried
      # sealed bundle that phase 2 opens.
      - name: setup-recipe offline phase 1 round-trip
        run: >
          cargo test -p did-hosting-common --locked
          --features server-core --test offline_phase1
      # The committed OpenAPI spec (docs/openapi.json) is generated from the
      # `#[utoipa::path]` annotations on the HTTP handlers. This drift-check
      # fails if the annotations changed without regenerating the snapshot
      # (UPDATE_OPENAPI=1 cargo test -p did-hosting-server --features openapi
      # openapi_snapshot).
      - name: OpenAPI spec in sync
        run: >
          cargo test -p did-hosting-server --locked
          --features openapi openapi_snapshot_in_sync

  keyring-required:
    name: keyring round-trip (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Both targets where the workspace claims first-class keyring
        # support. macOS has Keychain; Linux gets a session bus + gnome-
        # keyring spun up explicitly so the test exercises a real Secret
        # Service implementation rather than silently skipping. Without
        # the explicit infrastructure the Linux runner has neither, so
        # the test would skip and a regression would land unnoticed.
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      KEYRING_TEST_REQUIRED: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux Secret Service
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 gnome-keyring libsecret-1-0 libsecret-1-dev \
            libdbus-1-dev pkg-config
      - name: Run keyring round-trip on macOS
        if: matrix.os == 'macos-latest'
        run: >
          cargo test -p did-hosting-common --lib
          --features server-core,store-fjall,keyring
          server::secret_store::keyring::tests::keyring_round_trip_when_backend_available
          --
          --nocapture
      - name: Run keyring round-trip on Linux (under dbus + gnome-keyring)
        if: matrix.os == 'ubuntu-latest'
        # `dbus-run-session` spins up a fresh session bus, then
        # `gnome-keyring-daemon --unlock` boots the keyring and prints the
        # `DBUS_SESSION_BUS_ADDRESS` and `GNOME_KEYRING_CONTROL` exports
        # the test process consumes via env. The unlock password is
        # piped via stdin per gnome-keyring-daemon's `--unlock` contract.
        run: |
          dbus-run-session -- bash -c '
            set -euo pipefail
            echo -n "ci-test-password" | gnome-keyring-daemon --unlock
            eval "$(echo -n "ci-test-password" | gnome-keyring-daemon --start)"
            export GNOME_KEYRING_CONTROL DBUS_SESSION_BUS_ADDRESS
            cargo test -p did-hosting-common --lib \
              --features server-core,store-fjall,keyring \
              server::secret_store::keyring::tests::keyring_round_trip_when_backend_available \
              -- --nocapture
          '

  methods:
    name: cargo build (DID method ${{ matrix.case }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each enabled-by-default method must build cleanly with
          # only its own feature on — proves the dispatcher arms are
          # individually compile-gated, and that the daemon CAN be
          # built as method-webvh-only or method-web-only.
          - case: webvh-only
            features: "method-webvh"
            expect: ok
          - case: web-only
            features: "method-web"
            expect: ok
          # Stubs MUST refuse to build with a `compile_error!`. CI
          # asserts the failure message — a future contributor who
          # accidentally removes the stub without supplying a real
          # impl would otherwise see the build "succeed" with the
          # method absent from `method_by_name`.
          - case: webs-stub
            features: "method-webs"
            expect: fail
            expected_message: "method-webs is not implemented in this release"
          - case: webplus-stub
            features: "method-webplus"
            expect: fail
            expected_message: "method-webplus is not implemented in this release"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Build did-hosting-common (${{ matrix.case }})
        run: |
          set +e
          out=$(cargo build -p did-hosting-common \
            --no-default-features --features "${{ matrix.features }}" 2>&1)
          status=$?
          set -e
          echo "$out"
          if [ "${{ matrix.expect }}" = "ok" ]; then
            if [ "$status" -ne 0 ]; then
              echo "::error::expected ${{ matrix.features }} to build, got exit $status"
              exit 1
            fi
          else
            if [ "$status" -eq 0 ]; then
              echo "::error::expected ${{ matrix.features }} to FAIL to build, got success"
              exit 1
            fi
            if ! echo "$out" | grep -q "${{ matrix.expected_message }}"; then
              echo "::error::expected failure to mention '${{ matrix.expected_message }}'"
              exit 1
            fi
          fi

  cloud-secrets-build:
    name: cargo build (cloud secret backends)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        backend:
          - aws-secrets
          - gcp-secrets
          - azure-secrets
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install libdbus-1-dev
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: >
          cargo build -p did-hosting-common --no-default-features
          --features "server-core,${{ matrix.backend }}"

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # NB: there is intentionally no `cargo publish --dry-run` job. The
  # did-hosting-* crates are a deployable service, not libraries — none are
  # published to crates.io, and did-hosting-common dev-depends on the
  # unpublished did-hosting-client (so a dry-run can never resolve). If any
  # crate is ever published, add a targeted job that excludes the unpublished
  # path dev-deps.
