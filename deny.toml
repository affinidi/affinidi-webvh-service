[advisories]
version = 2
ignore = [
  { id = "RUSTSEC-2024-0370", reason = "proc-macro-error is unmaintained but build-time-only — pulled in transitively via linked-data-derive (ssi-json-ld). No runtime exposure; no safe upgrade available upstream." },
  { id = "RUSTSEC-2023-0071", reason = "Marvin Attack on the `rsa` crate. Pulled in transitively by jsonwebtoken, but webvh JWTs use Ed25519 (EdDSA), so the RSA timing sidechannel is not on any code path we exercise." },
  # The three advisories below all live in `rustls-webpki 0.101.7`, an OLD copy
  # pulled only via `aws-smithy-http-client -> hyper-rustls 0.24.2` deep in the
  # AWS SDK. We don't depend on it directly and can't bump it without an
  # upstream AWS SDK release migrating off the old rustls stack; everything we
  # control already resolves the maintained `rustls-webpki 0.103.x`.
  # Re-evaluate when the AWS SDK drops rustls 0.21 / hyper-rustls 0.24.
  { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.101.7 — transitive via AWS SDK's hyper-rustls 0.24.2 only; not directly depended on or bumpable by us." },
  { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.101.7 — transitive via AWS SDK's hyper-rustls 0.24.2 only; not directly depended on or bumpable by us." },
  { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.101.7 — transitive via AWS SDK's hyper-rustls 0.24.2 only; not directly depended on or bumpable by us." },
  # Unmaintained-status advisories on transitive crates. These are not
  # exploitable vulnerabilities — the upstreams that pull them haven't migrated
  # yet, and we don't depend on any of them directly. Revisit as the relevant
  # dependencies update.
  { id = "RUSTSEC-2024-0384", reason = "`instant` unmaintained — transitive only (no direct dependency); upstreams haven't migrated to web-time." },
  { id = "RUSTSEC-2025-0012", reason = "`backoff` unmaintained — transitive only (no direct dependency)." },
  { id = "RUSTSEC-2025-0134", reason = "`rustls-pemfile` unmaintained — transitive only (folded into rustls upstream); no direct dependency." },
  { id = "RUSTSEC-2026-0173", reason = "`proc-macro-error2` unmaintained — build-time-only, transitive (no direct dependency); successor of the already-ignored proc-macro-error (RUSTSEC-2024-0370)." },
  { id = "RUSTSEC-2026-0215", reason = "`smallstr` unmaintained — transitive only, via json-syntax <- json-ld <- ssi-json-ld; no direct dependency and no upstream migration yet." },
]

[bans]
multiple-versions = "allow"

[licenses]
# We want really high confidence when inferring licenses from text
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "BSL-1.0",
  "BSD-1-Clause",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "CC0-1.0",
  "ISC",
  "MIT-0",
  "MIT",
  "NCSA",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
  # As stated here https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html#spdx-identifiers
  # 3.11 versions of SPDX License List was used and below licenses are not included there.
  # They are commented to avoid "[license-not-encountered]" warnings.
  #    "Apache-1.1",
  #    "WTFPL",
  #    "Fair",
  #    "Intel",
  #    "MIT-Modern-Variant",
  #    "MulanPSL-2.0",
  #    "Multics",
  #    "Naumen",
  #    "PHP-3.01",
  #    "PostgreSQL",
  #    "Python-2.0",
  #    "OFL-1.1",
  #    "MirOS",
  #    "UPL-1.0",
  #    "Unicode-DFS-2016",
  #    "AFL-2.1",
]

exceptions = [
  { allow = ["MPL-2.0"], crate = "bitmaps" },
  { allow = ["MPL-2.0"], crate = "im" },
  { allow = ["CC-BY-SA-3.0", "MPL-2.0"], crate = "sized-chunks" },
  { allow = ["MPL-2.0"], crate = "webauthn-rs" },
  { allow = ["MPL-2.0"], crate = "webauthn-rs-core" },
  { allow = ["MPL-2.0"], crate = "webauthn-rs-proto" },
  { allow = ["MPL-2.0"], crate = "webauthn-attestation-ca" },
  { allow = ["MPL-2.0"], crate = "base64urlsafedata" },
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-roots" },
  { allow = ["CDLA-Permissive-2.0"], crate = "webpki-root-certs" },
]

# Sigh
[[licenses.clarify]]
crate = "ring"
# SPDX considers OpenSSL to encompass both the OpenSSL and SSLeay licenses
# https://spdx.org/licenses/OpenSSL.html
# ISC - Both BoringSSL and ring use this for their new files
# MIT - "Files in third_party/ have their own licenses, as described therein. The MIT
# license, for third_party/fiat, which, unlike other third_party directories, is
# compiled into non-test libraries, is included below."
# OpenSSL - Obviously
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]
